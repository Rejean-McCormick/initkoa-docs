site_name: kOA Ecosystem Documentation
site_url: https://docs.initkoa.org

nav:
  - Home: index.md

theme:
  name: material
  logo: assets/images/LogoK.svg
  palette:
    scheme: slate
    primary: custom
    accent: custom

extra:
  homepage: https://initkoa.org

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - multirepo:
      cleanup: true
      repos:
        - section: SemantiK Architect
          import_url: 'https://github.com/Rejean-McCormick/SemantiK_Architect?branch=main'
        - section: Kristal Framework
          import_url: 'https://github.com/Rejean-McCormick/kristal-framework?branch=main'
        - section: kOA Digital Ecosystem
          import_url: 'https://github.com/Rejean-McCormick/kOA_Digital_Ecosystem?branch=main'
        - section: Konnaxion
          import_url: 'https://github.com/Rejean-McCormick/Konnaxion?branch=main'
        - section: Orgo
          import_url: 'https://github.com/Rejean-McCormick/Orgo?branch=master'
        - section: SenTient
          import_url: 'https://github.com/Rejean-McCormick/SenTient?branch=main'